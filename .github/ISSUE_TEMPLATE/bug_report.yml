name: Bug report
description: Report a reproducible problem in setup, practice, review, or export.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands and redacted output.
      placeholder: |
        node scripts/english-learning-harness.mjs health --json
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, Node 22"
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private transcripts, local media, credentials, and learner data from this issue.
          required: true

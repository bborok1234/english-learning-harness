name: Learning experience feedback
description: Share feedback from using the harness for English practice.
title: "Learning feedback: "
labels:
  - question
body:
  - type: textarea
    id: moment
    attributes:
      label: Practice moment
      description: What were you trying to practice?
    validations:
      required: true
  - type: textarea
    id: helped
    attributes:
      label: What helped?
  - type: textarea
    id: friction
    attributes:
      label: What got in the way?
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private transcripts, local media, credentials, and learner data from this issue.
          required: true

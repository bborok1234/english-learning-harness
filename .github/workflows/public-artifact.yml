name: Public Artifact Candidate

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Upload the artifact to a GitHub release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: "Release tag to create/update when publish_release is true"
        required: false
        default: "public-artifact-candidate"
      artifact_repo:
        description: "Public artifact repository in owner/repo form when publish_release is true"
        required: false
        default: "bborok1234/english-learning-harness-public"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Package public artifact
        run: node scripts/package-public-artifact.mjs --target tmp/public-artifact

      - name: Verify artifact mechanics
        run: node scripts/phase7-public-artifact-smoke.mjs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: english-learning-harness-public
          path: tmp/public-artifact/english-learning-harness-public.tar.gz
          if-no-files-found: error

      - name: Publish release asset
        if: ${{ inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_ARTIFACT_REPO_TOKEN }}
          ARTIFACT_REPO: ${{ inputs.artifact_repo }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          test -n "$GH_TOKEN" || {
            echo "PUBLIC_ARTIFACT_REPO_TOKEN is required to publish to $ARTIFACT_REPO" >&2
            exit 1
          }
          gh release view "$RELEASE_TAG" --repo "$ARTIFACT_REPO" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --repo "$ARTIFACT_REPO" \
              --title "English Learning Harness public artifact candidate" \
              --notes "Artifact candidate generated by the public-artifact workflow."
          gh release upload "$RELEASE_TAG" \
            --repo "$ARTIFACT_REPO" \
            tmp/public-artifact/english-learning-harness-public.tar.gz \
            --clobber
